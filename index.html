<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nhân Lê | Portfolio</title>
    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        /* chia 2 cột toàn trang */
        .container{
            display:grid;
            grid-template-columns:300px 1fr;
            max-width:1000px;
            margin:40px auto 60px;
            gap:60px;
            padding:0 20px;
        }

        /* sidebar */
        .sidebar{
            padding-top:20px;
        }

        .avatar{
            width:160px;
            border-radius:50%;
            border:2px solid #e5e5e5;
            object-fit:cover;
        }

        .sidebar h1{
            margin:24px 0 4px;
            font-size:28px;
            letter-spacing:0.05em;
            text-transform:uppercase;
        }

        .sidebar p{
            margin:0 0 16px;
            color:#555;
        }

        .links a{
            margin-right:12px;
            color:#0077b6;
            text-decoration:none;
            font-size:14px;
        }

        .links a:hover{
            text-decoration:underline;
        }

        /* content */
        .content{
            padding-top:20px;
        }

        .content h2{
            margin:0 0 24px;
            font-size:22px;
            border-bottom:1px solid #e5e5e5;
            padding-bottom:6px;
        }

        .project{
            margin-bottom:30px;
        }

        .project h3{
            margin:0 0 4px;
            font-size:18px;
        }

        .project p{
            margin:0;
            color:#555;
        }

        @media (max-width: 768px){
            .container{
                grid-template-columns:1fr;
                gap:32px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
        <img src="images/avatar.jpg" class="avatar" alt="Ảnh Nhân Lê">

        <h1>Nhân Lê</h1>
        <p>Software Developer</p>

        <div class="links">
            <a href="#">Resume</a>
            <a href="https://github.com/nhane0105">GitHub</a>
        </div>
    </aside>


    <!-- RIGHT CONTENT -->
    <main class="content">

        <h2>Portfolio</h2>

        <div class="project">
            <h3>Student Management System</h3>
            <p>Windows Forms · SQL Server</p>
        </div>

        <div class="project">
            <h3>Android API App</h3>
            <p>Android · REST API</p>
        </div>

        <div class="project">
            <h3>Mini Portfolio Website</h3>
            <p>HTML · CSS · GitHub Pages</p>
        </div>

    </main>

</div>

</body>
</html>
